name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write
  deployments: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Generate API docs
        run: pdoc src/anthropic_news_mcp -o site --docformat google

      - name: Copy supplementary docs into site
        run: |
          mkdir -p site/runbooks
          cp -r docs/runbooks/* site/runbooks/ || true
          cp docs/dashboards.md site/dashboards.md || true
          cp docs/schema.json site/schema.json || true
          cp AGENTS.md site/AGENTS.md || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Create GitHub Deployment record
        id: deployment-record
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha;
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: sha,
              environment: 'docs',
              description: `Deploy docs for ${sha.slice(0, 7)}`,
              auto_merge: false,
              required_contexts: [],
              transient_environment: false,
              production_environment: false,
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

      - name: Mark deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const id = '${{ steps.deployment-record.outputs.deployment_id }}';
            const url = '${{ steps.deploy.outputs.page_url }}';
            if (!id) return;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt(id),
              state: 'success',
              environment_url: url,
              log_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: 'Docs published to GitHub Pages',
            });

      - name: Mark deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const id = '${{ steps.deployment-record.outputs.deployment_id }}';
            if (!id) return;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt(id),
              state: 'failure',
              description: 'Docs deployment failed',
            });
