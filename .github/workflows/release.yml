name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  deployments: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Create GitHub Deployment (in_progress)
        id: deployment
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: tag,
              environment: 'production',
              description: `Release ${tag}`,
              auto_merge: false,
              required_contexts: [],
            });
            core.setOutput('deployment_id', deployment.data.id);

      - name: Run tests
        run: pytest -q

      - name: Build package
        run: uv build

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)

          echo "## What's Changed" > /tmp/changelog.md
          echo "" >> /tmp/changelog.md

          if [ -n "$PREV_TAG" ]; then
            echo "### Commits since $PREV_TAG" >> /tmp/changelog.md
            git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" >> /tmp/changelog.md
          else
            echo "### All commits" >> /tmp/changelog.md
            git log --pretty=format:"- %s (%h)" >> /tmp/changelog.md
          fi

          echo "" >> /tmp/changelog.md
          echo "" >> /tmp/changelog.md
          echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" >> /tmp/changelog.md

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "prev_tag=$PREV_TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = '${{ steps.changelog.outputs.tag }}';
            const changelog = fs.readFileSync('/tmp/changelog.md', 'utf8');

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: `Release ${tag}`,
              body: changelog,
              draft: false,
              prerelease: tag.includes('-'),
            });

            const distFiles = require('fs').readdirSync('dist');
            for (const file of distFiles) {
              const data = fs.readFileSync(`dist/${file}`);
              await github.rest.repos.uploadReleaseAsset({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: release.data.id,
                name: file,
                data,
                headers: {
                  'content-type': file.endsWith('.whl')
                    ? 'application/zip'
                    : 'application/x-tar',
                  'content-length': data.length,
                },
              });
            }

            console.log(`Release created: ${release.data.html_url}`);
            core.setOutput('release_url', release.data.html_url);

      - name: Mark GitHub Deployment success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = '${{ steps.deployment.outputs.deployment_id }}';
            const releaseUrl = '${{ steps.create-release.outputs.release_url }}';
            if (!deploymentId) return;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt(deploymentId),
              state: 'success',
              log_url: releaseUrl || `https://github.com/${context.repo.owner}/${context.repo.repo}/releases`,
              description: 'Release published',
              environment_url: `https://github.com/${context.repo.owner}/${context.repo.repo}/releases`,
            });

      - name: Mark GitHub Deployment failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const deploymentId = '${{ steps.deployment.outputs.deployment_id }}';
            if (!deploymentId) return;
            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: parseInt(deploymentId),
              state: 'failure',
              description: 'Release workflow failed',
            });

      - name: Notify Slack (optional)
        if: success() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{\"text\":\"Released \`${TAG}\` of anthropic-news-mcp: https://github.com/${{ github.repository }}/releases/tag/${TAG}\"}"
