name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Smoke test import
        run: python -c "from anthropic_news_mcp.server import mcp; print('import ok')"

      - name: Lint (ruff)
        run: ruff check .

      - name: Format check (ruff)
        run: ruff format --check .

      - name: Type check (mypy)
        run: mypy --strict -p anthropic_news_mcp

      - name: Tests
        run: pytest -q

      - name: Offline eval
        run: python evals/run_offline_eval.py
