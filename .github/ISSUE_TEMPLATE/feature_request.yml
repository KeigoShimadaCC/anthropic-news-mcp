name: Feature request
description: Propose an enhancement to tools, sources, or developer workflow.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or maintainer problem does this solve?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the intended behavior and API/tooling impact.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What options were considered and why this is preferred?
    validations:
      required: false

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: Define concrete checks for completion.
      placeholder: |
        - [ ]
        - [ ]
    validations:
      required: true
